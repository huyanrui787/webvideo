<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Video Studio - 登录</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0c;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .box {
    background: #111114;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 32px;
    width: 360px;
  }
  h1 { text-align: center; font-size: 24px; margin-bottom: 4px; }
  .sub { text-align: center; color: rgba(255,255,255,0.55); font-size: 14px; margin-bottom: 24px; }
  label { display: block; font-size: 12px; color: rgba(255,255,255,0.55); margin-bottom: 6px; }
  input {
    width: 100%; padding: 10px 12px; border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04); color: #fff;
    font-size: 14px; margin-bottom: 16px; outline: none;
  }
  input:focus { border-color: rgba(255,255,255,0.3); }
  button {
    width: 100%; padding: 10px; border-radius: 12px;
    border: none; font-size: 14px; font-weight: 500;
    background: rgba(255,255,255,0.92); color: #0a0a0c;
    cursor: pointer; transition: opacity 0.2s;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { color: #f87171; font-size: 13px; margin-bottom: 16px; text-align: center; }
</style>
</head>
<body>
<div class="box">
  <h1>Web Video Studio</h1>
  <p class="sub">登录你的账号</p>
  <div id="error" class="error" style="display:none"></div>
  <form id="loginForm">
    <label>邮箱</label>
    <input type="email" name="email" placeholder="a@a.com" value="a@a.com" required autocomplete="email">
    <label>密码</label>
    <input type="password" name="password" placeholder="123456" value="123456" required autocomplete="current-password">
    <button type="submit" id="submitBtn">登录</button>
  </form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('error');
  btn.disabled = true;
  btn.textContent = '登录中…';
  err.style.display = 'none';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: e.target.email.value,
        password: e.target.password.value
      }),
    });
    const data = await res.json();
    if (!res.ok) {
      err.textContent = data.error || '登录失败';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '登录';
      return;
    }
    window.location.href = '/studio';
  } catch (ex) {
    err.textContent = '网络错误';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '登录';
  }
});
</script>
</body>
</html>
